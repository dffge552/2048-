<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 無盡模式</title>
    <style>

            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;

            background-color: #faf8ef;

        .controls {

</head>
<body>

<div class="header">
    <h1>2048 ∞</h1>
    <div style="display: flex; gap: 10px;">
        <div class="score-container">
            <div>分數</div>
            <div id="score">0</div>
        </div>
        <div class="score-container" style="background: #d4af37;">
            <div>👑 最高分</div>
            <div id="high-score">0</div>
        </div>
    </div>
</div>

<div class="info-panel">
    <div>最小掉落: <span id="min-spawn">2</span> | 最大方塊: <span id="max-tile">0</span></div>
</div>

<div style="display: flex; gap: 10px; width: 300px; margin-bottom: 10px;">
    <button onclick="confirmRestart()" style="
        flex: 1;
        padding: 12px;
        background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
        color: white;
        border: none;
        border-radius: 5px;
        font-size: 14px;
        font-weight: bold;
        cursor: pointer;
        box-shadow: 0 4px 12px rgba(40, 167, 69, 0.3);
    ">🔄 重新開始</button>

    <button id="endless-mode-btn" onclick="showEndlessModeDialog()" style="
        flex: 1;
        padding: 12px;
        background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        color: white;
        border: none;
        border-radius: 5px;
        font-size: 14px;
        font-weight: bold;
        cursor: pointer;
        box-shadow: 0 4px 12px rgba(245, 87, 108, 0.4);
    ">♾️ 無盡模式</button>

    <button onclick="showGameInfo()" style="
        flex: 1;
        padding: 12px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        border-radius: 5px;
        font-size: 14px;
        font-weight: bold;
        cursor: pointer;
        box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
    ">❓ 說明</button>
</div>

<div style="display: flex; gap: 10px; width: 300px; margin-bottom: 10px;">
    <button id="undo-btn" onclick="undoMove()" style="
        flex: 1;
        padding: 10px;
        background: #776e65;
        color: white;
        border: none;
        border-radius: 5px;
        font-size: 14px;
        font-weight: bold;
        cursor: pointer;
    ">↶ 悔步</button>

    <button id="history-btn" onclick="showHistory()" style="
        flex: 1;
        padding: 10px;
        background: #776e65;
        color: white;
        border: none;
        border-radius: 5px;
        font-size: 14px;
        font-weight: bold;
        cursor: pointer;
    ">📜 記錄</button>

    <button id="analyze-btn" onclick="analyzeMove()" style="
        flex: 1;
        padding: 10px;
        background: #776e65;
        color: white;
        border: none;
        border-radius: 5px;
        font-size: 14px;
        font-weight: bold;
        cursor: pointer;
    ">🧠 分析</button>
</div>

<div id="game-board"></div>

<div class="controls">
    <button class="control-btn" id="up">▲</button>
    <button class="control-btn" id="left">◄</button>
    <button class="control-btn" id="down">▼</button>
    <button class="control-btn" id="right">►</button>
</div>

<p style="text-align: center; color: #776e65;">
    使用 <b>方向鍵</b> 或 <b>按鈕</b> 來移動方塊！<br>
    <small>目標：達到 2¹⁰⁰ </small>
</p>

<script>
    const boardSize = 4;
    let board = [];
    let score = 0;
    let minSpawn = 2;

    // 歷史記錄系統
    let moveHistory = []; // 存儲 {board, score, minSpawn, direction}
    let moveSequence = []; // 存儲移動序列 ['上', '左', '右', ...]
    const maxHistoryLength = 10000; // 最多保存50步


    // 無盡模式相關變數
    let endlessModeActive = false;
    let endlessModeType = null;
    let endlessModeStartScore = 0;
    let endlessModeTimer = null;
    let endlessModeTimeRemaining = 0;

    let gameCompleted = false;

    let isShowingCompletedWarning = false; // 防止重复弹窗

    const highScoreManager = {
        getScore(type) {
            const key = `2048_endless_${type}`;
            const stored = localStorage.getItem(key);
            if (!stored) return 0;

            try {
                const data = JSON.parse(stored);
                return parseFloat(data.value) || 0;
            } catch {
                return parseFloat(stored) || 0;
            }
        },

        updateScore(type, newScore) {
            const currentHigh = this.getScore(type);
            if (newScore > currentHigh) {
                const key = `2048_endless_${type}`;
                localStorage.setItem(key, JSON.stringify({
                    value: newScore.toString(),
                    display: formatNumber(newScore),
                    timestamp: Date.now()
                }));
                return true;
            }
            return false;
        }
    };

    let normalHighScore = 0;

    // 暴露到全局
    window.endlessModeActive = false;
    window.endlessModeType = null;

    // 通用 Modal 顯示函數
    function showModal(title, content) {
        // 移除舊的 modal
        const oldModal = document.getElementById('game-modal');
        if (oldModal) oldModal.remove();

        const modal = document.createElement('div');
        modal.id = 'game-modal';
        modal.innerHTML = `
        <div style="
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        " onclick="this.remove()">
            <div style="
                background: white;
                padding: 25px;
                border-radius: 10px;
                max-width: 500px;
                width: 90%;
                max-height: 80vh;
                overflow-y: auto;
                box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            " onclick="event.stopPropagation()">
                <div style="
                    display: flex;
                    justify-content: space-between;
                    align-items: center;
                    margin-bottom: 20px;
                    padding-bottom: 15px;
                    border-bottom: 2px solid #bbada0;
                ">
                    <h2 style="margin: 0; color: #776e65;">${title}</h2>
                    <button onclick="document.getElementById('game-modal').remove()" style="
                        background: #8f7a66;
                        color: white;
                        border: none;
                        border-radius: 5px;
                        padding: 8px 15px;
                        cursor: pointer;
                        font-weight: bold;
                    ">✕</button>
                </div>
                <div>${content}</div>
            </div>
        </div>
    `;
        document.body.appendChild(modal);
    }

    function initGame() {
        gameCompleted = false; // 🔥 重置遊戲完成狀態

        board = Array(boardSize).fill().map(() => Array(boardSize).fill(0));
        score = 0;
        minSpawn = 2;
        moveHistory = [];
        moveSequence = [];

        const storedHigh = localStorage.getItem('2048_normal_high_score');
        if (storedHigh) {
            try {
                const data = JSON.parse(storedHigh);
                normalHighScore = parseFloat(data.value) || 0;
            } catch {
                normalHighScore = parseFloat(storedHigh) || 0;
            }
        } else {
            normalHighScore = 0;
        }

        document.getElementById('high-score').textContent = formatNumber(normalHighScore);

        updateScore();
        updateInfo();
        addTile();
        addTile();
        renderBoard();

        if (aiMode) stopAI();
        aiStats = { moves: 0, strategy: '準備中...' };
    }

    // AI 模式相關變量
    let aiMode = false;
    let aiInterval = null;
    let aiSpeed = 50; // AI 移動速度(毫秒)
    let aiStats = {
        moves: 0,
        strategy: '準備中...'
    };

    // ========== 新版 AI 系統 ==========

    // 深度評估函數 - 多維度打分
    function evaluateBoard() {
        let score = 0;
        const maxTile = getMaxTile();

        // 統計數據
        let emptyCount = 0;
        let tileCount = {};
        let allValues = [];

        for (let r = 0; r < boardSize; r++) {
            for (let c = 0; c < boardSize; c++) {
                let val = board[r][c];
                if (val === 0) {
                    emptyCount++;
                } else {
                    tileCount[val] = (tileCount[val] || 0) + 1;
                    allValues.push(val);
                }
            }
        }

        // ===== 評分系統 =====

        // 1. 空格數 - 超高權重（生存空間）
        score += Math.pow(emptyCount, 3) * 1000;

        // 2. 小方塊懲罰系統（階梯式）
        let minSpawnCount = tileCount[minSpawn] || 0;
        let minSpawn2Count = tileCount[minSpawn * 2] || 0;
        let minSpawn4Count = tileCount[minSpawn * 4] || 0;

        score -= minSpawnCount * 2000;      // 最小方塊重懲
        score -= minSpawn2Count * 1000;     // 次小方塊懲罰
        score -= minSpawn4Count * 300;      // 小方塊輕懲

        // 3. 數值比例健康度（最關鍵）
        let ratio = maxTile / minSpawn;
        if (ratio <= 4) score += 8000;      // 極佳
        else if (ratio <= 8) score += 5000;  // 優秀
        else if (ratio <= 16) score += 2000; // 良好
        else if (ratio <= 32) score -= 1000; // 警戒
        else score -= 5000;                  // 危險

        // 4. 位置權重（蛇形強化）
        const positionWeights = [
            [65536, 32768, 16384, 8192],
            [512,   1024,  2048,  4096],
            [256,   128,   64,    32],
            [2,     4,     8,     16]
        ];

        for (let r = 0; r < boardSize; r++) {
            for (let c = 0; c < boardSize; c++) {
                if (board[r][c] > 0) {
                    score += board[r][c] * positionWeights[r][c] * 0.1;
                }
            }
        }

        // 5. 最大值位置（強制左上）
        if (board[0][0] === maxTile) score += 10000;
        else if (board[0][3] === maxTile) score += 3000;
        else if (board[3][0] === maxTile) score += 3000;
        else score -= 2000;

        // 6. 單調性（每行每列遞減）
        let monotonicity = 0;

        // 檢查行
        for (let r = 0; r < boardSize; r++) {
            for (let c = 0; c < boardSize - 1; c++) {
                if (board[r][c] >= board[r][c+1]) monotonicity += 50;
                else monotonicity -= 30;
            }
        }

        // 檢查列
        for (let c = 0; c < boardSize; c++) {
            for (let r = 0; r < boardSize - 1; r++) {
                if (board[r][c] >= board[r+1][c]) monotonicity += 50;
                else monotonicity -= 30;
            }
        }

        score += monotonicity;

        // 7. 合併潛力（重點：小方塊合併）
        for (let r = 0; r < boardSize; r++) {
            for (let c = 0; c < boardSize; c++) {
                let val = board[r][c];
                if (val > 0) {
                    let mergeBonus = 0;

                    // 檢查右邊
                    if (c < boardSize - 1 && board[r][c+1] === val) {
                        mergeBonus = val <= minSpawn * 4 ? val * 30 : val * 5;
                        score += mergeBonus;
                    }

                    // 檢查下面
                    if (r < boardSize - 1 && board[r+1][c] === val) {
                        mergeBonus = val <= minSpawn * 4 ? val * 30 : val * 5;
                        score += mergeBonus;
                    }
                }
            }
        }

        // 8. 數值平滑度（避免跳躍）
        if (allValues.length > 0) {
            allValues.sort((a, b) => b - a);
            let smoothness = 0;
            for (let i = 0; i < allValues.length - 1; i++) {
                let ratio = allValues[i] / allValues[i + 1];
                if (ratio === 2) smoothness += 100;  // 完美倍數
                else if (ratio <= 4) smoothness += 50;
                else smoothness -= 50;
            }
            score += smoothness;
        }

        return score;
    }

    // 模擬移動（不添加新方塊）
    function simulateMove(direction) {
        let moved = false;
        if (direction === 'left' || direction === 'right') {
            for (let r = 0; r < boardSize; r++) {
                let row = board[r].slice();
                if (direction === 'right') row.reverse();
                let newRow = slide(row);
                if (direction === 'right') newRow.reverse();
                if (JSON.stringify(board[r]) !== JSON.stringify(newRow)) moved = true;
                board[r] = newRow;
            }
        } else {
            for (let c = 0; c < boardSize; c++) {
                let column = [board[0][c], board[1][c], board[2][c], board[3][c]];
                if (direction === 'down') column.reverse();
                let newColumn = slide(column);
                if (direction === 'down') newColumn.reverse();
                for (let r = 0; r < boardSize; r++) {
                    if (board[r][c] !== newColumn[r]) moved = true;
                    board[r][c] = newColumn[r];
                }
            }
        }
        return moved;
    }

    // 多步搜索 AI
    function getBestMove() {
        const directions = ['left', 'up', 'right', 'down'];
        let bestScore = -Infinity;
        let bestMove = null;

        for (let dir of directions) {
            let totalScore = 0;
            let simulations = 3; // 每個方向模擬3次

            for (let sim = 0; sim < simulations; sim++) {
                let savedBoard = JSON.parse(JSON.stringify(board));
                let savedScore = score;

                // 第一步移動
                let moved = simulateMove(dir);

                if (!moved) {
                    totalScore = -Infinity;
                    board = savedBoard;
                    score = savedScore;
                    break;
                }

                // 模擬添加隨機方塊
                let emptyCells = [];
                for (let r = 0; r < boardSize; r++) {
                    for (let c = 0; c < boardSize; c++) {
                        if (board[r][c] === 0) emptyCells.push({r, c});
                    }
                }

                if (emptyCells.length > 0) {
                    let randomCell = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                    board[randomCell.r][randomCell.c] = Math.random() < 0.9 ? minSpawn : minSpawn * 2;
                }

                // 評估當前局面
                let currentScore = evaluateBoard();

                // 再看下一步（深度2）
                let futureScore = 0;
                for (let nextDir of directions) {
                    let tempBoard = JSON.parse(JSON.stringify(board));
                    let tempScore = score;

                    if (simulateMove(nextDir)) {
                        futureScore = Math.max(futureScore, evaluateBoard());
                    }

                    board = tempBoard;
                    score = tempScore;
                }

                totalScore += currentScore + futureScore * 0.5;

                // 恢復棋盤
                board = savedBoard;
                score = savedScore;
            }

            let avgScore = totalScore / simulations;

            if (avgScore > bestScore) {
                bestScore = avgScore;
                bestMove = dir;
            }
        }

        return bestMove;
    }

    // AI 執行一步
    function aiMove() {
        if (!aiMode) return;

        const bestMove = getBestMove();
        if (bestMove) {
            // 更新策略顯示
            const maxTile = getMaxTile();
            let minSpawnCount = 0;
            let minSpawn2Count = 0;

            for (let r = 0; r < boardSize; r++) {
                for (let c = 0; c < boardSize; c++) {
                    if (board[r][c] === minSpawn) minSpawnCount++;
                    if (board[r][c] === minSpawn * 2) minSpawn2Count++;
                }
            }

            let smallTiles = minSpawnCount + minSpawn2Count;
            let ratio = maxTile / minSpawn;

            if (smallTiles >= 5) {
                aiStats.strategy = `🚨 危急！清理 ${smallTiles} 個小方塊`;
            } else if (ratio > 32) {
                aiStats.strategy = `⚠️ 比例失衡 ${ratio.toFixed(0)}:1`;
            } else if (smallTiles >= 3) {
                aiStats.strategy = `🧹 清理模式 (${smallTiles}個小方塊)`;
            } else if (ratio <= 8) {
                aiStats.strategy = `✨ 完美狀態 ${ratio.toFixed(0)}:1`;
            } else {
                aiStats.strategy = `📊 穩定發展中`;
            }

            aiStats.moves++;
            updateAIStatus();
            move(bestMove);
        } else {
            stopAI();
            showModal('🤖 AI 遊戲結束', `
    <div style="text-align: center; font-size: 16px; line-height: 1.8;">
        <p style="font-size: 18px; font-weight: bold; color: #776e65; margin-bottom: 15px;">AI 已盡力！</p>

    function getMaxTile() {
        let max = 0;
        for (let r = 0; r < boardSize; r++) {
            for (let c = 0; c < boardSize; c++) {
                if (board[r][c] > max) max = board[r][c];
            }
        }
        return max;
    }

    function hasTileValue(value) {
        for (let r = 0; r < boardSize; r++) {
            for (let c = 0; c < boardSize; c++) {
                if (board[r][c] === value) return true;
            }
        }
        return false;
    }

    function updateMinSpawn() {
        const maxTile = getMaxTile();
        if (maxTile === 0) return;

        if (maxTile >= minSpawn * 8) {
            if (!hasTileValue(minSpawn)) {
                minSpawn *= 2;
                updateInfo();
            }
        }
    }

    function addTile() {
        let emptyCells = [];
        for (let r = 0; r < boardSize; r++) {
            for (let c = 0; c < boardSize; c++) {
                if (board[r][c] === 0) emptyCells.push({r, c});
            }
        }
        if (emptyCells.length > 0) {
            let {r, c} = emptyCells[Math.floor(Math.random() * emptyCells.length)];
            board[r][c] = Math.random() < 0.9 ? minSpawn : minSpawn * 2;
        }
    }

    function formatNumber(num) {
        // 使用中文單位顯示大數字（修正：1溝 = 10000穰）
        if (num >= 1e32) {
            // 只有達到 10000 穰才顯示為溝
            const gou = num / 1e32;
            if (gou >= 1) {
                return Math.floor(gou).toLocaleString() + '溝';
            } else {
                // 未滿 1 溝，顯示為穰
                return Math.floor(num / 1e28).toLocaleString() + '穰';
            }
        } else if (num >= 1e28) {
            return Math.floor(num / 1e28).toLocaleString() + '穰';
        } else if (num >= 1e24) {
            return Math.floor(num / 1e24).toLocaleString() + '秭';
        } else if (num >= 1e20) {
            return Math.floor(num / 1e20).toLocaleString() + '垓';
        } else if (num >= 1e16) {
            return Math.floor(num / 1e16).toLocaleString() + '京';
        } else if (num >= 1e12) {
            return Math.floor(num / 1e12).toLocaleString() + '兆';
        } else if (num >= 1e8) {
            return Math.floor(num / 1e8).toLocaleString() + '億';
        } else if (num >= 1e4) {
            return Math.floor(num / 1e4).toLocaleString() + '萬';
        }

        return num.toLocaleString();
    }

    function renderBoard() {
        const container = document.getElementById('game-board');
        container.innerHTML = '';

        board.forEach(row => {
            row.forEach(val => {
                const cell = document.createElement('div');
                let className = 'cell';

                if (val > 0) {
                    let power = Math.round(Math.log2(val));

                    if (power >= 1 && power <= 100) {
                        className += ` n-p${power}`;
                    } else if (power > 100) {
                        className += ' n-super';
                    }
                }

                cell.className = className;
                const text = val > 0 ? formatNumber(val) : '';
                cell.textContent = text;

                // 動態調整字體大小以填滿方塊
                if (text) {
                    // 根據文字長度計算字體大小
                    let textLength = text.length;
                    let fontSize;

                    if (textLength <= 1) {
                        fontSize = 35;
                    } else if (textLength === 2) {
                        fontSize = 32;
                    } else if (textLength === 3) {
                        fontSize = 28;
                    } else if (textLength === 4) {
                        fontSize = 24;
                    } else if (textLength === 5) {
                        fontSize = 20;
                    } else if (textLength === 6) {
                        fontSize = 16;
                    } else if (textLength === 7) {
                        fontSize = 14;
                    } else if (textLength === 8) {
                        fontSize = 12;
                    } else {
                        fontSize = 10;
                    }

                    cell.style.fontSize = fontSize + 'px';
                }

                container.appendChild(cell);
            });
        });
    }

    function updateScore() {
        document.getElementById('score').textContent = formatNumber(score);

        if (score > normalHighScore) {
            normalHighScore = score;

            localStorage.setItem('2048_normal_high_score', JSON.stringify({

    function updateInfo() {
        document.getElementById('min-spawn').textContent = formatNumber(minSpawn);
        document.getElementById('max-tile').textContent = formatNumber(getMaxTile());
    }

    function slide(row) {
        let arr = row.filter(val => val);
        for (let i = 0; i < arr.length - 1; i++) {
            if (arr[i] === arr[i+1]) {
                arr[i] *= 2;
                score += arr[i];
                arr[i+1] = 0;
            }
        }
        arr = arr.filter(val => val);
        while (arr.length < boardSize) arr.push(0);
        return arr;
    }

    function isGameOver() {
        // 檢查是否有空格
        for (let r = 0; r < boardSize; r++) {
            for (let c = 0; c < boardSize; c++) {
                if (board[r][c] === 0) return false;
            }
        }

        // 檢查是否有相鄰相同的方塊可以合併
        for (let r = 0; r < boardSize; r++) {
            for (let c = 0; c < boardSize; c++) {
                const current = board[r][c];
                // 檢查右邊
                if (c < boardSize - 1 && board[r][c + 1] === current) return false;
                // 檢查下面
                if (r < boardSize - 1 && board[r + 1][c] === current) return false;
            }
        }

        // 如果在無盡模式中且遊戲結束，觸發無盡模式結束
        if (endlessModeActive) {
            setTimeout(() => {
                endEndlessMode(true);
            }, 100);
        }

        return true;
    }

        if (moveSequence.length > 0) {
            moveSequence.pop();
        }

        updateScore();
        updateInfo();

    function analyzeMove() {
        const directions = ['left', 'up', 'right', 'down'];
        const directionNames = {
            'left': '← 左',
            'up': '↑ 上',
            'right': '→ 右',
            'down': '↓ 下'
        };
        const directionIcons = {
            'left': '◄',
            'up': '▲',
            'right': '►',
            'down': '▼'
        };

        let bestScore = -Infinity;
        let bestMove = null;
        let allScores = {};

        // 評估每個方向
        for (let dir of directions) {
            let savedBoard = JSON.parse(JSON.stringify(board));
            let savedScore = score;

            let moved = simulateMove(dir);

            if (!moved) {
                allScores[dir] = -Infinity;
                board = savedBoard;
                score = savedScore;
                continue;
            }

            let evalScore = evaluateBoard();
            allScores[dir] = evalScore;

            if (evalScore > bestScore) {
                bestScore = evalScore;
                bestMove = dir;
            }

            board = savedBoard;
            score = savedScore;
        }

        // 按分數排序
        let sortedMoves = Object.entries(allScores)
            .filter(([dir, score]) => score !== -Infinity)
            .sort((a, b) => b[1] - a[1]);

        if (sortedMoves.length === 0) {
            showModal('🧠 AI 分析', '<p style="text-align: center; color: #dc143c; font-size: 18px;">❌ 無可用招法！遊戲結束</p>');
            return;
        }

        let content = '<div>';

        // 顯示每個方向的評分
        sortedMoves.forEach(([dir, evalScore], index) => {
            let bgColor, textColor, rating;
            if (index === 0) {
                bgColor = '#28a745';
                textColor = '#fff';
                rating = '⭐ 最佳';
            } else if (index === 1) {
                bgColor = '#f2b179';
                textColor = '#fff';
                rating = '✓ 次佳';
            } else {
                bgColor = '#eee4da';
                textColor = '#776e65';
                rating = '△ 可選';
            }

            content += `
            <div style="
                padding: 15px;
                margin-bottom: 10px;
                background: ${bgColor};
                color: ${textColor};
                border-radius: 8px;
                display: flex;
                justify-content: space-between;
                align-items: center;
            ">
                <div style="font-size: 32px;">${directionIcons[dir]}</div>
                <div style="flex: 1; margin: 0 15px;">
                    <div style="font-weight: bold; font-size: 16px;">${directionNames[dir]}</div>
                    <div style="font-size: 12px; opacity: 0.9;">${rating}</div>
                </div>
                <div style="font-weight: bold; font-size: 18px;">${Math.round(evalScore)}</div>
            </div>
        `;
        });

        // 分析原因
        const maxTile = getMaxTile();
        let minSpawnCount = 0;
        for (let r = 0; r < boardSize; r++) {

            }
        }

        content += '<div style="margin-top: 15px; padding: 12px; background: #faf8ef; border-radius: 5px; color: #776e65;">';
        content += '<div style="font-weight: bold; margin-bottom: 8px;">💡 策略建議</div>';

        if (minSpawnCount >= 4) {
            content += '<div>⚠️ 小方塊過多，優先清理</div>';
        } else if (maxTile / minSpawn > 32) {
            content += '<div>⚠️ 數值差距大，注意平衡</div>';
        } else {
            content += '<div>✨ 局勢良好，穩定發展</div>';
        }

        content += '</div></div>';

        showModal('🧠 AI 分析結果', content);

    function move(direction) {

        if (gameCompleted) {
            showGameCompletedWarning();
            return;
        }

        // 🔥 修復：只在移動前保存一次狀態
        const prevBoard = JSON.stringify(board);
        const prevScore = score;
        const prevMinSpawn = minSpawn;

        // 記錄移動方向
        const directionMap = {
            'up': '↑ 上',
            'down': '↓ 下',
            'left': '← 左',
            'right': '→ 右'
        };

        // 執行移動
        if (direction === 'left' || direction === 'right') {
            for (let r = 0; r < boardSize; r++) {
                let row = board[r];
                if (direction === 'right') row.reverse();
                row = slide(row);
                if (direction === 'right') row.reverse();
                board[r] = row;
            }
        } else {
            for (let c = 0; c < boardSize; c++) {
                let column = [board[0][c], board[1][c], board[2][c], board[3][c]];
                if (direction === 'down') column.reverse();
                column = slide(column);
                if (direction === 'down') column.reverse();
                for (let r = 0; r < boardSize; r++) board[r][c] = column[r];
            }
        }

        // 檢查是否有實際移動
        if (prevBoard !== JSON.stringify(board)) {
            // 🔥 只有移動成功才保存狀態
            moveHistory.push({
                board: JSON.parse(prevBoard),
                score: prevScore,
                minSpawn: prevMinSpawn
            });

            // 限制歷史長度
            if (moveHistory.length > maxHistoryLength) {
                moveHistory.shift();
                if (moveSequence.length > maxHistoryLength - 1) {
                    moveSequence.shift();
                }
            }

            moveSequence.push(directionMap[direction]);
            updateMinSpawn();
            addTile();
            updateScore();
            updateInfo();
            renderBoard();

            // 檢查是否達到 2^100 (勝利)
            const maxTile = getMaxTile();
            if (maxTile >= 1267650600228229401496703205376 && !gameCompleted) {
                gameCompleted = true;

                // 如果 AI 正在運行，立即停止
                if (aiMode) {
                    stopAI();
                }

                // 如果在無盡模式中，立即結算
                if (endlessModeActive) {
                    setTimeout(() => {
                        showVictoryNotification();
                        // 延遲 2 秒後結算無盡模式
                        setTimeout(() => {
                            endEndlessMode(false);
                        }, 2000);
                    }, 300);
                } else {
                    // 普通模式：顯示提示
                    setTimeout(() => {
                        showVictoryNotification();
                    }, 300);
                }
            }

            // 檢查遊戲是否結束（無路可走）
            if (isGameOver()) {
                setTimeout(() => {
                    showGameOverModal();
                }, 100);
            }
        }
    }

        // 移除舊的小工具

        const widget = document.createElement('div');
        widget.id = 'ai-status-widget';

`;

        document.body.appendChild(widget);

        // 讓 widget 可以拖動
        let isDragging = false;
        let currentX;
        let currentY;
        let initialX;
        let initialY;

        widget.addEventListener('mousedown', (e) => {
            isDragging = true;
            initialX = e.clientX - widget.offsetLeft;
            initialY = e.clientY - widget.offsetTop;
        });

        document.addEventListener('mousemove', (e) => {
            if (isDragging) {
                e.preventDefault();
                currentX = e.clientX - initialX;
                currentY = e.clientY - initialY;

                widget.style.left = currentX + 'px';
                widget.style.top = currentY + 'px';
                widget.style.right = 'auto'; // 取消 right 定位
            }
        });

        document.addEventListener('mouseup', () => {
            isDragging = false;
        });

        // 觸控支援
        widget.addEventListener('touchstart', (e) => {
            isDragging = true;
            const touch = e.touches[0];
            initialX = touch.clientX - widget.offsetLeft;
            initialY = touch.clientY - widget.offsetTop;
        });

        document.addEventListener('touchmove', (e) => {
            if (isDragging) {
                e.preventDefault();
                const touch = e.touches[0];
                currentX = touch.clientX - initialX;
                currentY = touch.clientY - initialY;

                widget.style.left = currentX + 'px';
                widget.style.top = currentY + 'px';
                widget.style.right = 'auto';
            }
        });

        document.addEventListener('touchend', () => {
            isDragging = false;
        });

        // 開始更新狀態
        updateAIWidgetStatus();
    }

    // 開始倒計時
    function startTimerCountdown() {
        endlessModeTimer = setInterval(() => {
            endlessModeTimeRemaining--;

            const minutes = Math.floor(endlessModeTimeRemaining / 60);
            const seconds = endlessModeTimeRemaining % 60;
            const display = `${minutes}:${seconds.toString().padStart(2, '0')}`;

            const timerDisplay = document.getElementById('timer-display');
            if (timerDisplay) {
                timerDisplay.textContent = display;

                if (endlessModeTimeRemaining <= 10) {
                    timerDisplay.style.color = endlessModeTimeRemaining % 2 === 0 ? '#ff0000' : '#ffffff';
                }
            }

            if (endlessModeTimeRemaining <= 0) {
                endEndlessMode(false);
            }
        }, 1000);
    }

    function setupEndlessModeInterceptor() {
        document.addEventListener('click', endlessModeClickInterceptor, true);

    function removeEndlessModeInterceptor() {
        document.removeEventListener('click', endlessModeClickInterceptor, true);

    // 點擊事件攔截器
    function endlessModeClickInterceptor(e) {
        if (!endlessModeActive) return;

        const btn = e.target.closest('button');
        if (!btn) return;

        const text = btn.textContent;

        // 攔截悔步和分析按鈕
        const isBlockedButton = text.includes('↶ 悔步') ||
            text.includes('🧠 分析') ||
            text.includes('📜 紀錄');

        if (isBlockedButton) {
            e.preventDefault();
            e.stopPropagation();
            e.stopImmediatePropagation();
            showEndlessModeWarning();
            return false;
        }
    }

                目前處於無盡模式，無法使用以下功能：
            </p>
            <div style="background: #faf8ef; padding: 20px; border-radius: 10px; margin-bottom: 25px; text-align: left;">
                <div style="margin-bottom: 10px; color: #776e65;">❌ 悔步功能</div>
                <div style="margin-bottom: 10px; color: #776e65;">❌ AI 分析</div>

            </div>
            <p style="font-size: 14px; color: #8f7a66; margin-bottom: 25px;">
                請先結束無盡模式才能使用這些功能
            </p>
            <button onclick="document.getElementById('endless-warning-modal').remove()" style="
                padding: 15px 40px;
                background: #f44336;
                color: white;
                border: none;
                border-radius: 10px;
                font-size: 18px;
                font-weight: bold;
                cursor: pointer;
            ">我知道了</button>
        </div>
    `;

        const modal = document.createElement('div');
        modal.id = 'endless-warning-modal';
        modal.innerHTML = `
        <div style="
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
        ">
            <div style="
                background: white;
                padding: 25px;
                border-radius: 10px;
                max-width: 500px;
                width: 90%;
                box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            ">
                ${content}
            </div>
        </div>
    `;
        document.body.appendChild(modal);
    }

    // 通知提示
    function showNotification(message, type = 'info') {
        const notification = document.createElement('div');
        const bgColor = type === 'success' ? '#4CAF50' : type === 'error' ? '#f44336' : '#2196F3';

        notification.style.cssText = `
        position: fixed;
        top: 80px;
        left: 50%;
        transform: translateX(-50%);
        background: ${bgColor};
        color: white;
        padding: 15px 30px;
        border-radius: 10px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        z-index: 2000;
        font-weight: bold;
        white-space: pre-line;
        text-align: center;
    `;

        notification.textContent = message;
        document.body.appendChild(notification);

        setTimeout(() => {
            notification.style.transition = 'opacity 0.3s';
            notification.style.opacity = '0';
            setTimeout(() => notification.remove(), 300);
        }, 3000);
    }

    function showGameCompletedWarning() {
        // 如果已有弹窗，不重复创建
        if (document.getElementById('game-completed-modal')) {
            return;
        }

        const modal = document.createElement('div');
        modal.id = 'game-completed-modal';
        modal.style.cssText = `
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.7);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 10000;
    `;

        modal.innerHTML = `
        <div style="
            background: white;
            padding: 25px;
            border-radius: 10px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        ">
            <div style="text-align: center;">
                <div style="font-size: 64px; margin-bottom: 20px;">🏆</div>
                <h2 style="margin: 0 0 15px 0; color: #776e65;">遊戲已完成</h2>
                <p style="font-size: 18px; line-height: 1.8; margin-bottom: 25px; color: #8f7a66;">
                    你已經達到 <strong style="color: #f5576c;">2^100</strong><br>
                    並征服了這個遊戲！
                </p>
                <div style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); padding: 20px; border-radius: 10px; margin-bottom: 25px; color: white;">
                    <div style="font-size: 14px; opacity: 0.9; margin-bottom: 5px;">📸 棋盤已鎖定</div>
                    <div style="font-size: 16px; font-weight: bold;">可以截圖留念，但無法繼續操作</div>
                </div>
                <div style="display: flex; gap: 15px;">
                    <button id="close-completed-btn" style="
                        flex: 1;
                        padding: 15px;
                        background: #2196F3;
                        color: white;
                        border: none;
                        border-radius: 10px;
                        font-size: 18px;
                        font-weight: bold;
                        cursor: pointer;
                    ">✕ 關閉</button>
                    <button id="restart-completed-btn" style="
                        flex: 1;
                        padding: 15px;
                        background: #28a745;
                        color: white;
                        border: none;
                        border-radius: 10px;
                        font-size: 18px;
                        font-weight: bold;
                        cursor: pointer;
                    ">🔄 重新開始</button>
                </div>
            </div>
        </div>
    `;

        document.body.appendChild(modal);

        // 关闭按钮
        document.getElementById('close-completed-btn').onclick = () => {
            modal.remove();
        };

        // 重新开始按钮
        document.getElementById('restart-completed-btn').onclick = () => {
            modal.remove();
            initGame();
        };

        // 点击背景关闭
        modal.onclick = (e) => {
            if (e.target === modal) {
                modal.remove();
            }
        };
    }

    // 鍵盤控制
    window.addEventListener('keydown', e => {
        // 🔥 AI 無盡模式禁止手動控制
        if (endlessModeActive && endlessModeType === 'ai') {
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
                e.preventDefault();
                showAIControlWarning();
            }
            return;
        }

        // 🔥 遊戲已完成，禁止移動 - 但不在这里弹窗，交给 move() 处理
        if (e.key === 'ArrowUp') { e.preventDefault(); move('up'); }
        if (e.key === 'ArrowDown') { e.preventDefault(); move('down'); }
        if (e.key === 'ArrowLeft') { e.preventDefault(); move('left'); }
        if (e.key === 'ArrowRight') { e.preventDefault(); move('right'); }
    });

    // 按鈕控制
    document.getElementById('up').addEventListener('click', () => {
        if (endlessModeActive && endlessModeType === 'ai') {
            showAIControlWarning();
            return;
        }
        move('up'); // 直接调用 move，让 move 自己处理 gameCompleted
    });

    document.getElementById('down').addEventListener('click', () => {
        if (endlessModeActive && endlessModeType === 'ai') {
            showAIControlWarning();
            return;
        }
        move('down');
    });

    document.getElementById('left').addEventListener('click', () => {
        if (endlessModeActive && endlessModeType === 'ai') {
            showAIControlWarning();
            return;
        }
        move('left');
    });

    document.getElementById('right').addEventListener('click', () => {
        if (endlessModeActive && endlessModeType === 'ai') {
            showAIControlWarning();
            return;
        }
        move('right');
    });

    // 觸控支援
    document.getElementById('up').addEventListener('touchstart', (e) => {
        if (endlessModeActive && endlessModeType === 'ai') {
            e.preventDefault();
            showAIControlWarning();
            return;
        }
        e.preventDefault();
        move('up');
    });

    document.getElementById('down').addEventListener('touchstart', (e) => {
        if (endlessModeActive && endlessModeType === 'ai') {
            e.preventDefault();
            showAIControlWarning();
            return;
        }
        e.preventDefault();
        move('down');
    });

    document.getElementById('left').addEventListener('touchstart', (e) => {
        if (endlessModeActive && endlessModeType === 'ai') {
            e.preventDefault();
            showAIControlWarning();
            return;
        }
        e.preventDefault();
        move('left');
    });

    document.getElementById('right').addEventListener('touchstart', (e) => {
        if (endlessModeActive && endlessModeType === 'ai') {
            e.preventDefault();
            showAIControlWarning();
            return;
        }
        e.preventDefault();
        move('right');
    });

    initGame();
</script>
</body>
<html>
